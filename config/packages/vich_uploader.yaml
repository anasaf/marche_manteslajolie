vich_uploader:
    db_driver: orm
    storage: flysystem
    mappings:
        products:
            uri_prefix: /uploads/products
            upload_destination: '%kernel.project_dir%/public/uploads/products'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
        commercants:
            uri_prefix: /uploads/commercants
            upload_destination: '%kernel.project_dir%/public/uploads/commercants'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
